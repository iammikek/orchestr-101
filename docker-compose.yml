services:
  api:
    build: .
    ports:
      - "8005:8005"
    environment:
      - NODE_ENV=production
      - APP_PORT=8005
      - APP_HOST=0.0.0.0
      - DB_DATABASE=/app/database/database.sqlite
      - JWT_SECRET=docker-jwt-secret-for-orchestr-101-dev
    volumes:
      - app-data:/app/database

  api-dev:
    build: .
    profiles:
      - dev
    ports:
      - "8005:8005"
    environment:
      - APP_PORT=8005
      - APP_HOST=0.0.0.0
      - DB_DATABASE=/app/database/database.sqlite
      - JWT_SECRET=docker-jwt-secret-for-orchestr-101-dev
    volumes:
      - .:/app
      - /app/node_modules
    command: node public/index.js

volumes:
  app-data:
